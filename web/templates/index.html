<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeDistillDet - 训练控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="/static/dist/app.css">
    <style>
      .agent-layout {
        align-items: stretch;
      }
      .agent-main {
        min-height: 100%;
      }
      .agent-status-panel {
        display: flex;
        flex-direction: column;
        padding: 0;
        flex: 1 1 auto;
      }
      .status-header {
        padding: 16px 16px 10px;
      }
      .agent-output {
        margin: 0 16px 16px;
        flex: 1 1 0;
        min-height: 0;
        max-height: none;
        border-radius: var(--radius-md);
      }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/static/dist/app.js"></script>
</body>
</html>
