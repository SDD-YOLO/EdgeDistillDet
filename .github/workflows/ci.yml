name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy .

      - name: Run pytest
        run: pytest -q

  web-dist:
    name: Web dist matches build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: npm ci && npm run build

      - name: Verify committed dist matches build
        working-directory: ${{ github.workspace }}
        run: |
          if ! git diff --quiet -- web/static/dist/; then
            echo "::error::web/static/dist 与当前 npm ci && npm run build 结果不一致。"
            echo "请在仓库根目录执行: cd web && npm ci && npm run build，然后提交 web/static/dist/ 的变更。"
            git diff --stat -- web/static/dist/
            git diff -- web/static/dist/
            exit 1
          fi
          echo "OK: web/static/dist 与构建产物一致。"

