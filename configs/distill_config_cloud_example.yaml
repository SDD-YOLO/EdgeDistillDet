distillation:
  student_weight: /root/autodl-tmp/models/yolov8n.pt
  teacher_weight: /root/autodl-tmp/models/yolov8m.pt
  alpha_init: 0.5
  T_max: 6.0
  T_min: 1.5
  warm_epochs: 5
  w_kd: 0.5
  w_focal: 0.3
  w_feat: 0.0
  scale_boost: 2.0
  focal_gamma: 2.0
  teacher_cfg: ''
  distill_mode: adaptive
  temperature: 0
  alpha: 0
  beta: 0
  gamma: 0
  cls_distill_weight: 0
  box_distill_weight: 0
  obj_distill_weight: 0
  distill_loss_type: kl
  freeze_teacher: false
  teacher_device: ''
  distill_start_epoch: 0
  distill_end_epoch: 0
  dynamic_alpha: false
  dynamic_temperature: false
  feature_layers: ''
  lambda_kd: 0
  use_adaptive_loss: false

training:
  # 可选: local | autodl | colab
  # 如果未填写，前端会根据 data_yaml / output.project 自动推断
  compute_provider: autodl
  data_yaml: /root/autodl-tmp/datasets/your_dataset/data.yaml
  device: "0"
  epochs: 150
  imgsz: 640
  batch: 16
  lr0: 0.01
  lrf: 0.1
  warmup_epochs: 3
  mosaic: 0.8
  mixup: 0.1
  close_mosaic: 20
  amp: true

output:
  project: /root/autodl-tmp/runs/distill
  name: cloud_exp1
export_model:
  export_path: ''
  format: onnx
  keras: false
  optimize: false
  int8: false
  dynamic: false
  simplify: false
  opset: 0
  workspace: 0
  nms: false
  save_dir: ''
predict:
  source: ''
  output_dir: /root/autodl-tmp/runs/inference_results
  device: '0'
  imgsz: 640
  conf: 0.25
  iou: 0.45
  save_txt: false
  save_conf: false
  save_crop: false
  show_labels: false
  show_conf: false
  show_boxes: false
  visualize: false
  show: false
  line_width: 0
# Google Colab 参考:
