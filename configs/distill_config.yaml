distillation:
  student_weight: models/yolov8n.pt
  teacher_weight: models/yolov8m.pt
  alpha_init: 0.5
  T_max: 5
  T_min: 2
  warm_epochs: 15
  w_kd: 0.55
  w_focal: 0.55
  w_feat: 0.7
  scale_boost: 1.2
  focal_gamma: 2
  temperature: 6
  alpha: 0.5
  distill_type: soft
training:
  compute_provider: local
  cloud_api:
    base_url: ''
    submit_path: /train/start
    status_path: /train/status
    logs_path: /train/logs
    stop_path: /train/stop
    token: ''
    poll_interval_sec: 3
  dataset_api:
    enabled: false
    source: path
    resolve_url: ''
    token: ''
    dataset_name: ''
  data_yaml: coco128.yaml
  device: '0'
  epochs: 5
  imgsz: 640
  batch: 16
  workers: 6
  lr0: 0.01
  lrf: 0.15
  warmup_epochs: 5
  mosaic: 0.8
  mixup: 0.3
  close_mosaic: 6
  amp: true
  batch_size: 64
  learning_rate: 0.0003
  grad_clip: 5
output:
  project: runs
  name: exp1
  model_dir: ./output/models
  log_dir: ./logs
wandb:
  enabled: true
  mode: online
  project: edge-distilldet
  entity: ''
  name: ''
  group: ''
  job_type: distill-train
  tags: []
  notes: ''
__agentPreConfirmedOverlap: true
