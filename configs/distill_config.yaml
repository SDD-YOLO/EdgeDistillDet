distillation:
  student_weight: models/yolov8n.pt
  teacher_weight: models/yolov8m.pt
  alpha_init: 0.5
  T_max: 5
  T_min: 1.5
  warm_epochs: 20
  w_kd: 0.6
  w_focal: 0.55
  w_feat: 0.5
  scale_boost: 1.5
  focal_gamma: 2
training:
  compute_provider: local
  cloud_api:
    base_url: ''
    submit_path: /train/start
    status_path: /train/status
    logs_path: /train/logs
    stop_path: /train/stop
    token: ''
    poll_interval_sec: 3
  dataset_api:
    enabled: false
    source: path
    resolve_url: ''
    token: ''
    dataset_name: ''
  data_yaml: coco128.yaml
  device: '0'
  epochs: 120
  imgsz: 640
  batch: 16
  lr0: 0.001
  lrf: 0.05
  warmup_epochs: 20
  mosaic: 0.8
  mixup: 0.7
  close_mosaic: 10
  amp: true
output:
  project: runs/distill
  name: exp1
wandb:
  enabled: false
  mode: online
  project: edge-distilldet
  entity: ''
  name: ''
  group: ''
  job_type: distill-train
  tags: []
  notes: ''
