# ============================================================
# COCO 数据集配置示例（用于快速验证训练流程）
# configs/dataset_coco.yaml
# ============================================================
#
# ultralytics 会自动下载 COCO128 用于测试
# 仅用于验证训练流程是否正常，不用于正式实验

path: ../datasets/coco128  # 或使用 ultralytics 内置路径
train: images/train2017    # COCO128 训练集
val: images/val2017        # COCO128 验证集

# COCO 80类（简化版仅用部分类别进行小目标蒸馏）
nc: 80
names:
  - person, bicycle, car, motorcycle, airplane,
  - bus, train, truck, boat, traffic light,
  - fire hydrant, stop sign, parking meter, bench, bird,
  - cat, dog, horse, sheep, cow, elephant, bear,
  - zebra, giraffe, backpack, umbrella, handbag,
  - tie, suitcase, frisbee, skis, snowboard,
  - sports ball, kite, baseball bat, baseball glove,
  - skateboard, surfboard, tennis racket, bottle,
  - wine glass, cup, fork, knife, spoon, bowl,
  - banana, apple, sandwich, orange, broccoli,
  - carrot, hot dog, pizza, donut, cake,
  - chair, couch, potted plant, bed, dining table,
  - toilet, tv, laptop, mouse, remote, keyboard,
  - cell phone, microwave, oven, toaster, sink,
  - refrigerator, book, clock, vase, scissors,
  - teddy bear, hair drier, toothbrush
