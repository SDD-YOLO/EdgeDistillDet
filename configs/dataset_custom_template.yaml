# ============================================================
# 自定义数据集模板 — 复制此文件并修改你的路径
# configs/dataset_custom.yaml
# ============================================================
#
# 【步骤1】将此文件复制为 dataset_custom.yaml
# 【步骤2】修改下面的路径和类别信息
# 【步骤3】在 distill_config.yaml 中引用此文件

# ====== 数据集根目录（默认回退到仓库内 mini_test 样例，确保可直接加载）======
# 若要切换到自己的数据集，请设置环境变量 DATASET_ROOT
path: ${DATASET_ROOT:-../datasets/mini_test}

# ====== 图像目录（相对于 path）======
train: images/train
val: images/val
test: images/test # 可选

# ====== 类别配置（根据你的数据集修改）======
nc: 2 # 类别数量
names:
  - car # 类别1
  - person # 类别2
