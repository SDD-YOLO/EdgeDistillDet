# ============================================================
# VisDrone 数据集配置示例（默认回退到仓库内 mini_test 样例，保证可直接加载）
# configs/dataset_visdrone.yaml
# ============================================================
#
# 使用前请将以下路径替换为你的实际数据集路径
# VisDrone 数据集下载: https://github.com/VisDrone
#
# 目录结构示例:
#   ./datasets/visdrone/
#   ├── images/
#   │   ├── train/      # 训练图像
#   │   └── val/        # 验证图像
#   └── labels/
#       ├── train/      # YOLO格式标注 (.txt)
#       └── val/        # YOLO格式标注

path: ${VISDRONE_ROOT:-../datasets/mini_test} # 数据集根目录（相对项目根目录或绝对路径）
train: images/train # 训练集图像目录（相对于 path）
val: images/val # 验证集图像目录（相对于 path）
test: images/val # 测试集（可选，默认复用验证集样例）

# 默认样例仅用于开箱验证，因此使用仓库内 2 类样例
nc: 2
names:
  - car # 小汽车
  - person # 行人
