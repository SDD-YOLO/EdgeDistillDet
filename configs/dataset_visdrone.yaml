# ============================================================
# VisDrone 数据集配置示例
# configs/dataset_visdrone.yaml
# ============================================================
#
# 使用前请将以下路径替换为你的实际数据集路径
# VisDrone 数据集下载: https://github.com/VisDrone
#
# 目录结构示例:
#   F:/VisDrone/
#   ├── images/
#   │   ├── train/      # 训练图像
#   │   └── val/        # 验证图像
#   └── labels/
#       ├── train/      # YOLO格式标注 (.txt)
#       └── val/        # YOLO格式标注

path: ./datasets/visdrone  # 数据集根目录（相对项目根目录或绝对路径）
train: images/train        # 训练集图像目录（相对于 path）
val: images/val            # 验证集图像目录（相对于 path）
test: images/test          # 测试集（可选）

# VisDrone 类别定义 (10类)
nc: 10
names:
  - pedestrian        # 行人
  - people            # 人群
  - bicycle           # 自行车
  - car               # 小汽车
  - van               # 面包车
  - truck             # 卡车
  - tricycle          # 三轮车
  - awning-tricyle    # 遮阳三轮车
  - bus               # 公交车
  - motor            # 摩托车
