# .pre-commit-config.yaml
# 本地 git commit 前自动运行
# 安装: pre-commit install
# 手动运行: pre-commit run --all-files

repos:
  # ========== Ruff: Python 代码检查 + 格式化 ==========
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]

      - id: ruff-format
        types_or: [python, pyi]

    # ========== 通用文件检查 ==========
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$

      - id: end-of-file-fixer

      - id: check-yaml

      - id: check-toml

      - id: check-added-large-files
        args: [--maxkb=1000]

      - id: check-merge-conflict

      - id: debug-statements
        types: [python]

  # ========== Prettier: 前端代码格式化 ==========
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        additional_dependencies:
          - prettier@3.1.0
